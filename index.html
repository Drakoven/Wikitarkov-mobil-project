<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Companion app for Escape from Tarkov — quests, hideout, traders, maps and ammo.">
  <meta name="theme-color" content="#d6b56d">

  <title>Raid Companion</title>

  <!-- Preconnect to API to reduce first call latency -->
  <link rel="preconnect" href="https://api.tarkov.dev">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>

  <header>
    <h1>Raid Companion</h1>
    <p>Companion app for Escape from Tarkov</p>
  </header>

  <main>
    <input
      type="search"
      id="searchInput"
      placeholder="Search quests, items..."
      aria-label="Search"
    />

    <section id="content" aria-live="polite"></section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button onclick="showHome()">Home</button>
    <button onclick="getQuests()">Quests</button>
    <button onclick="showItems()">Items</button>
    <button onclick="showMaps()">Maps</button>
    <button onclick="showHideout()">Hideout</button>
    <button onclick="showTraders()">Traders</button>
    <button onclick="showAmmo()">Ammo</button>
    <button onclick="showFavorites()">Favorites</button>
  </nav>

  <script src="app.js"></script>

</body>
</html>
